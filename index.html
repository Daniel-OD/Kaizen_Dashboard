<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Kaizen Date Gaz — Dashboard Strategic Corelare GIS ↔ SAP PM</title>
<style>
:root {
  /* Brand — SAP blue + GIS green (din retea_distributie_iasi) */
  --navy: #1a5fa8;--blue: #2563a8;--lblue: #daeaf8;--llblue: #eef6fc;
  --bg: #f5f4f0;--bg2: #ffffff;--bg3: #f0eeea;--border: rgba(0,0,0,.09);
  --text: #1a1916;--muted: #6b6860;
  --green: #2d7a4f;--green-bg: #d4eddf;--red: #c0392b;--red-bg: #fde8e6;
  --yellow: #e8a000;--yellow-bg: #fef6e4;--accent: #1a5fa8;--purple: #7c3aed;
  --mono: 'DM Mono', 'IBM Plex Mono', monospace;
  --sans: 'DM Sans', 'IBM Plex Sans', sans-serif;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.1);
  --r: 14px;--rsm: 8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.mono{font-family:var(--mono);}.text-accent{color:var(--accent);}.text-green{color:var(--green);}.text-red{color:var(--red);}.text-yellow{color:var(--yellow);}.text-muted{color:var(--muted);}
.header{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px 14px;box-shadow:var(--shadow-sm);}
.header-badge{font-family:var(--mono);font-size:10px;color:var(--navy);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;background:var(--lblue);display:inline-block;padding:2px 8px;border-radius:4px;}
.header h1{font-size:19px;font-weight:700;letter-spacing:-0.4px;color:var(--text);}
.header-sub{color:var(--muted);font-size:11px;margin-top:3px;line-height:1.5;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.stats{display:flex;gap:12px;flex-shrink:0;flex-wrap:wrap;}
.stat{background:var(--llblue);border:1px solid rgba(26,95,168,.15);border-radius:var(--rsm);padding:8px 14px;text-align:center;min-width:85px;}
.stat .v{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--navy);display:block;}
.stat .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.tabs{display:flex;border-bottom:1px solid var(--border);background:#fff;padding:0 24px;overflow-x:auto;gap:4px;box-shadow:var(--shadow-sm);}
.tab{padding:9px 15px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:var(--transition);white-space:nowrap;letter-spacing:.01em;}
.tab:hover{color:var(--text);}.tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:600;}
.content{display:none;}.content.active{display:block;animation:fadeIn .2s ease;}.pad{padding:18px 24px;}@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.note{background:var(--llblue);border:1px solid rgba(26,95,168,.2);border-left:3px solid var(--navy);border-radius:0 var(--rsm) var(--rsm) 0;padding:9px 13px;font-size:11px;color:#0d3d6b;margin-bottom:14px;display:flex;gap:8px;}
.note::before{content:'ℹ';font-size:12px;flex-shrink:0;}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm);}
table{width:100%;border-collapse:collapse;font-size:11.5px;background:#fff;}
th{background:var(--bg3);color:var(--muted);padding:7px 10px;text-align:left;font-weight:600;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;border:none;border-bottom:2px solid var(--border);}
th.c,td.c{text-align:center;}
td{padding:7px 10px;border:none;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:nth-child(even) td{background:var(--bg3);}tr:nth-child(odd) td{background:#fff;}tr:hover td{background:var(--llblue)!important;transition:background .12s;}
tr.merged td{background:rgba(26,95,168,.05)!important;}
tr.tot td{background:var(--navy)!important;color:#fff;font-weight:700;font-family:var(--mono);font-size:10px;letter-spacing:.02em;}
tr.heatmap-critical td{background:#fde8e6!important;border-left:3px solid var(--red)!important;}
tr.heatmap-warning td{background:#fef6e4!important;border-left:3px solid var(--yellow)!important;}
tr.heatmap-ok td{background:#d4eddf!important;border-left:3px solid var(--green)!important;}
td.n{font-family:var(--mono);text-align:right;}
.pb{display:flex;align-items:center;gap:5px;}
.pb-bg{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:45px;}
.pb-fill{height:100%;border-radius:3px;transition:width .4s;}
.pb-txt{font-family:var(--mono);font-size:10px;width:44px;text-align:right;}
.badge{display:inline-block;font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:99px;font-family:var(--mono);}
.bm{background:var(--llblue);color:var(--navy);border:1px solid rgba(26,95,168,.2);font-weight:600;}.bs{background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
.role-pill{display:inline-block;font-size:8px;font-weight:600;padding:1px 5px;border-radius:3px;font-family:var(--mono);}
.rp-gis{background:var(--llblue);color:var(--navy);border:1px solid rgba(26,95,168,.2);}
.rp-rasr{background:#fef6e4;color:#7a4f00;border:1px solid rgba(232,160,0,.2);}
.rp-fol{background:var(--green-bg);color:#1a5f35;border:1px solid rgba(45,122,79,.2);}
.rp-fol-0{background:var(--bg3);color:var(--muted);border:1px solid var(--border);opacity:.6;}
.rb{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}
.rok{background:#d4eddf;color:#1a5f35;border:1px solid rgba(45,122,79,.25);font-weight:600;}
.rno{background:#fde8e6;color:#8b1f17;border:1px solid rgba(192,57,43,.25);font-weight:600;}
.upload-bar{display:flex;align-items:center;gap:12px;background:#fff;border-bottom:1px solid var(--border);padding:10px 24px;flex-wrap:wrap;}
.upload-btn{display:inline-flex;align-items:center;gap:7px;background:var(--navy);color:#fff;border:1px solid var(--navy);border-radius:var(--rsm);padding:7px 14px;font-family:var(--sans);font-size:11px;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;box-shadow:0 1px 4px rgba(26,95,168,.3);}
.upload-btn:hover{background:#154f8c;}.upload-btn input{display:none;}
.upload-status{font-family:var(--mono);font-size:11px;flex:1;}
.upload-status.ok{color:var(--green);}.upload-status.err{color:var(--red);}.upload-status.idle{color:var(--muted);}
.upload-info{font-size:10px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;}
.upload-info span{background:var(--llblue);border:1px solid rgba(26,95,168,.15);border-radius:4px;padding:2px 8px;font-family:var(--mono);color:var(--navy);}
.kpi-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:2px solid var(--border);display:flex;align-items:stretch;gap:0;box-shadow:var(--shadow-md);}
.kpi-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;border-right:1px solid var(--border);min-width:0;transition:var(--transition);cursor:default;}
.kpi-item:last-child{border-right:none;}.kpi-item:hover{background:var(--llblue);}
.kpi-val{font-family:var(--mono);font-size:17px;font-weight:600;line-height:1;white-space:nowrap;}
.kpi-lbl{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;text-align:center;}
.blockers-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin:12px 24px 0 24px;padding:14px 18px;box-shadow:var(--shadow-sm);}
.blockers-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.blockers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.blocker-item{background:var(--bg3);border-radius:var(--rsm);padding:10px 12px;border-left:3px solid;transition:var(--transition);cursor:pointer;}
.blocker-item:hover{transform:translateY(-2px);background:var(--llblue);}
.blocker-rank{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1;}
.blocker-name{font-weight:600;font-size:12px;margin:4px 0 2px;}
.blocker-detail{font-size:9px;color:var(--muted);font-family:var(--mono);}
.blocker-critical{border-left-color:var(--red);}.blocker-warning{border-left-color:var(--yellow);}.blocker-ok{border-left-color:var(--green);}
.probability-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin:12px 24px 0 24px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;box-shadow:var(--shadow-sm);}
.probability-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;}
.probability-bar-container{flex:2;min-width:200px;}
.probability-bar-bg{height:24px;background:var(--bg3);border-radius:12px;overflow:hidden;position:relative;border:1px solid var(--border);}
.probability-bar-fill{height:100%;border-radius:12px;transition:width .5s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;}
.probability-value{font-family:var(--mono);font-size:24px;font-weight:700;min-width:80px;text-align:center;}
.probability-risk{font-size:10px;padding:4px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);}
.executive-toggle{display:flex;align-items:center;gap:10px;background:var(--bg3);padding:8px 24px;border-bottom:1px solid var(--border);}
.toggle-switch{position:relative;display:inline-block;width:44px;height:22px;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:var(--bg3);border-radius:22px;transition:.3s;}
.toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:2px;bottom:2px;background-color:var(--accent);border-radius:50%;transition:.3s;}
input:checked+.toggle-slider:before{transform:translateX(22px);}
.toggle-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.executive-mode .content .tw,.executive-mode .content table,.executive-mode .plan-grid,.executive-mode .tl-wrap,.executive-mode #tProj,.executive-mode .note{display:none!important;}
.executive-mode .content.pad{padding:12px 24px;}
.executive-mode .pg{display:grid;grid-template-columns:repeat(4,1fr);}
.whatif-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin:12px 24px;padding:14px 18px;box-shadow:var(--shadow-sm);}
.whatif-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.whatif-controls{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end;}
.whatif-group{flex:1;min-width:150px;}
.whatif-group label{font-size:9px;color:var(--muted);display:block;margin-bottom:4px;}
.whatif-select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-family:var(--sans);font-size:11px;padding:6px 8px;width:100%;outline:none;}
.whatif-slider{width:100%;background:var(--bg3);height:4px;border-radius:2px;-webkit-appearance:none;}
.whatif-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;}
.whatif-value{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);margin-top:4px;}
.whatif-result{background:var(--llblue);border-radius:0 var(--rsm) var(--rsm) 0;padding:10px 14px;margin-top:12px;font-size:11px;border-left:3px solid var(--navy);color:#0d3d6b;}
.whatif-impact{color:var(--green);font-weight:600;}
.alert-strip{background:var(--bg3);border-bottom:1px solid var(--border);padding:6px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.alert-strip-lbl{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.ag{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9.5px;font-weight:600;padding:3px 8px;border-radius:4px;cursor:pointer;transition:var(--transition);}
.ag:hover{opacity:.8;transform:translateY(-1px);}
.ag-ok{background:#d4eddf;color:#1a5f35;border:1px solid rgba(45,122,79,.25);}
.ag-warn{background:#fef6e4;color:#7a4f00;border:1px solid rgba(232,160,0,.25);}
.ag-nok{background:#fde8e6;color:#8b1f17;border:1px solid rgba(192,57,43,.25);}
.ag-dot{width:6px;height:6px;border-radius:50%;}
.prog-wrap{padding:10px 24px 0;background:#fff;border-bottom:1px solid var(--border);}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.prog-label{font-size:10px;color:var(--muted);width:160px;flex-shrink:0;}
.prog-outer{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative;min-width:120px;border:1px solid var(--border);}
.prog-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.prog-plan-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,200,50,.8);border-radius:1px;}
.prog-pct{font-family:var(--mono);font-size:10px;width:42px;text-align:right;}
.prog-eta{font-family:var(--mono);font-size:9px;color:var(--muted);width:140px;}
.toolbar{display:flex;align-items:center;gap:10px;padding:8px 24px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.tb-group{display:flex;align-items:center;gap:6px;}
.tb-lbl{font-size:10px;color:var(--muted);}
.tb-date{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--navy);font-family:var(--mono);font-size:11px;padding:4px 8px;outline:none;}
.tb-date:focus{border-color:var(--accent);}
.tb-sep{width:1px;height:20px;background:var(--border);}
.tb-btn{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:11px;font-weight:500;padding:5px 11px;cursor:pointer;transition:var(--transition);white-space:nowrap;font-family:var(--sans);}
.tb-btn:hover{background:var(--llblue);border-color:var(--navy);color:var(--navy);}
.tb-btn svg{flex-shrink:0;}.tb-spacer{flex:1;}
.days-counter{font-family:var(--mono);font-size:11px;}
.notif-panel{display:none;position:fixed;top:0;right:0;bottom:0;width:350px;max-width:90vw;background:#fff;border-left:1px solid var(--border);z-index:200;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.15);}
.notif-panel.open{display:flex;}
.notif-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.notif-hdr h3{font-size:12px;font-weight:600;letter-spacing:.5px;}
.notif-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;}
.notif-close:hover{color:var(--text);}
.notif-list{flex:1;overflow-y:auto;padding:12px;}
.notif-item{background:var(--bg3);border-radius:var(--rsm);padding:10px 12px;margin-bottom:8px;border-left:3px solid;}
.notif-item.err{border-color:var(--red);}.notif-item.warn{border-color:var(--yellow);}.notif-item.ok{border-color:var(--green);}
.notif-item .ni-title{font-size:11px;font-weight:600;margin-bottom:3px;}
.notif-item .ni-msg{font-size:10px;color:var(--muted);line-height:1.4;}
.notif-badge{background:var(--red);color:#fff;font-family:var(--mono);font-size:9px;font-weight:600;border-radius:99px;padding:1px 5px;margin-left:4px;transition:var(--transition);}
.plan-grid{display:grid;grid-template-columns:300px 1fr;gap:18px;}
@media(max-width:900px){.plan-grid{grid-template-columns:1fr;}}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);}
.panel h3{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--navy);margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.pr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:8px;flex-wrap:nowrap;}
.pl{color:var(--muted);font-size:11px;flex:1;}
.pi{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--navy);font-family:var(--mono);font-size:13px;font-weight:600;padding:4px 8px;width:76px;min-width:60px;text-align:right;outline:none;flex-shrink:0;}
.pi:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,95,168,.12);}
.pu{color:var(--muted);font-size:10px;width:48px;flex-shrink:0;}
.tgt{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 11px;margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.td2{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tl2{flex:1;font-size:10px;color:var(--muted);}
.ti{background:var(--bg);border:1px solid var(--border);border-radius:var(--rsm);color:var(--navy);font-family:var(--mono);font-size:13px;font-weight:600;padding:3px 7px;width:56px;text-align:center;outline:none;}
.ti:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,95,168,.12);}
.tu{font-size:9px;color:var(--muted);width:28px;}
.gc{margin-top:13px;}
.gc h4{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.gr{display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid var(--border);min-width:0;}
.gr:last-child{border-bottom:none;}
.gn{flex:1;font-size:10px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gin{background:var(--bg3);border:1px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 4px;width:33px;text-align:center;outline:none;}
.gin.gis{color:#58a6ff;}.gin.gis:focus{border-color:#58a6ff;}
.gin.rasr{color:#f0c060;}.gin.rasr:focus{border-color:#f0c060;}
.gin.fol{color:#3fb950;}.gin.fol:focus{border-color:#3fb950;}
.gl{font-size:8px;color:var(--muted);text-align:center;line-height:1.2;}
.comp-hdr{display:flex;gap:4px;justify-content:flex-end;padding-bottom:4px;margin-bottom:1px;}
.comp-hdr span{font-size:8px;font-weight:600;width:33px;text-align:center;letter-spacing:.5px;text-transform:uppercase;}
.pg{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px;}
@media(max-width:700px){.pg{grid-template-columns:repeat(2,1fr);}}
.pc{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;transition:var(--transition);box-shadow:var(--shadow-sm);}
.pc:hover{transform:translateY(-2px);border-color:var(--navy);box-shadow:0 6px 20px rgba(26,95,168,.15);}
.pc .pv{font-family:var(--mono);font-size:24px;font-weight:600;line-height:1;margin-bottom:3px;}
.pc .pla{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.pc .pd{font-size:11px;margin-top:5px;color:var(--muted);}
.tl-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:18px;box-shadow:var(--shadow-sm);}
.tl-wrap h3{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
.tlr{display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:nowrap;}
.tll{font-size:10px;color:var(--text);width:190px;flex-shrink:0;}
.tlbw{flex:1;position:relative;height:18px;min-width:120px;}
.tlbb{position:absolute;inset:0;background:var(--bg3);border-radius:3px;border:1px solid var(--border);}
.tlbf{position:absolute;left:0;top:0;bottom:0;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:5px;font-family:var(--mono);font-size:9px;font-weight:600;color:#fff;overflow:hidden;white-space:nowrap;}
.tltl{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,200,50,.8);border-radius:1px;}
.tlta{position:absolute;top:-14px;font-size:8px;color:var(--yellow);transform:translateX(-50%);white-space:nowrap;font-family:var(--mono);}
.tly{font-family:var(--mono);font-size:10px;color:var(--muted);width:48px;text-align:right;}
.sec{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 11px;display:flex;align-items:center;gap:7px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.reset-btn{background:#fde8e6;border-color:rgba(192,57,43,.3);color:#8b1f17;}
.reset-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}

/* ── EXECUTIVE TAB ── */
.exec-wrap{padding:24px;max-width:1100px;margin:0 auto;}
.exec-hero{background:linear-gradient(135deg,var(--navy) 0%,#2563a8 60%,#1a4f8c 100%);border:none;border-radius:var(--r);padding:28px 32px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;box-shadow:0 4px 20px rgba(26,95,168,.35);}
.exec-hero-left h2{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px;margin-bottom:4px;}
.exec-hero-left p{font-size:12px;color:rgba(255,255,255,.8);}
.exec-hero-date{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.75);margin-top:8px;}
.exec-verdict{text-align:center;padding:16px 28px;background:rgba(255,255,255,.03);border-radius:10px;min-width:200px;}
.exec-verdict-val{font-family:var(--mono);font-size:48px;font-weight:700;line-height:1;}
.exec-verdict-lbl{font-size:10px;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}
.exec-verdict-sub{font-size:11px;margin-top:6px;color:rgba(255,255,255,.7);}

.exec-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
@media(max-width:700px){.exec-kpi-row{grid-template-columns:repeat(2,1fr);}}
.exec-kpi{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;text-align:center;position:relative;overflow:hidden;transition:var(--transition);box-shadow:var(--shadow-sm);}
.exec-kpi:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(26,95,168,.15);}
.exec-kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0;}
.exec-kpi.green::before{background:var(--green);}
.exec-kpi.yellow::before{background:var(--yellow);}
.exec-kpi.red::before{background:var(--red);}
.exec-kpi.blue::before{background:var(--accent);}
.exec-kpi-val{font-family:var(--mono);font-size:32px;font-weight:700;line-height:1;margin-bottom:4px;}
.exec-kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.exec-kpi-sub{font-size:10px;margin-top:5px;font-family:var(--mono);}

.exec-two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:700px){.exec-two-col{grid-template-columns:1fr;}}

.exec-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm);}
.exec-card h3{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.exec-card h3 span{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}

.exec-group-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.exec-group-item:last-child{border-bottom:none;}
.exec-group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.exec-group-name{font-size:11px;font-weight:600;flex:1;}
.exec-group-bar-wrap{flex:2;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.exec-group-bar{height:100%;border-radius:3px;transition:width .5s;}
.exec-group-pct{font-family:var(--mono);font-size:10px;width:40px;text-align:right;}
.exec-group-eta{font-family:var(--mono);font-size:9px;width:70px;text-align:right;}

.exec-action-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.exec-action-item:last-child{border-bottom:none;}
.exec-action-icon{font-size:16px;flex-shrink:0;line-height:1.2;}
.exec-action-text{flex:1;}
.exec-action-title{font-size:11px;font-weight:600;margin-bottom:2px;}
.exec-action-desc{font-size:10px;color:var(--muted);line-height:1.4;}
.exec-action-badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.exec-action-badge.urgent{background:#fde8e6;color:#8b1f17;border:1px solid rgba(192,57,43,.25);}
.exec-action-badge.watch{background:#fef6e4;color:#7a4f00;border:1px solid rgba(232,160,0,.25);}
.exec-action-badge.good{background:#d4eddf;color:#1a5f35;border:1px solid rgba(45,122,79,.25);}

.exec-progress-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:20px;box-shadow:var(--shadow-sm);}
.exec-progress-card h3{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.exec-prog-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.exec-prog-label{font-size:11px;color:var(--text);width:180px;flex-shrink:0;font-weight:500;}
.exec-prog-outer{flex:1;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;position:relative;border:1px solid var(--border);}
.exec-prog-fill{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.exec-prog-target{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,200,50,.8);}
.exec-prog-pct{font-family:var(--mono);font-size:11px;font-weight:600;width:48px;text-align:right;}
.exec-prog-eta{font-family:var(--mono);font-size:10px;color:var(--muted);width:120px;text-align:right;}

.exec-footer{text-align:center;padding:16px;font-size:10px;color:var(--muted);font-family:var(--mono);}


/* ── RANKING ── */
.ranking-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.ranking-item:last-child{border-bottom:none;}
.ranking-pos{font-family:var(--mono);font-size:13px;width:24px;text-align:center;flex-shrink:0;}
.ranking-name{font-size:11px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ranking-bar{flex:2;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:60px;border:1px solid var(--border);}
.ranking-fill{height:100%;border-radius:3px;transition:width .5s;}
.ranking-value{font-family:var(--mono);font-size:9px;color:var(--muted);width:80px;text-align:right;flex-shrink:0;}
.ranking-avg-line{border-top:1px dashed var(--border);margin:8px 0 4px;padding-top:6px;font-size:9px;color:var(--muted);display:flex;justify-content:space-between;}

/* ── EXEC PRINT BUTTON ── */
.exec-print-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:var(--rsm);padding:8px 16px;font-family:var(--sans);font-size:11px;font-weight:600;cursor:pointer;transition:var(--transition);margin-top:4px;backdrop-filter:blur(4px);}
.exec-print-btn:hover{background:rgba(255,255,255,.3);}

/* ── KPI TARGET HINT ── */
.kpi-target{font-size:8px;color:var(--muted);margin-top:2px;font-family:var(--mono);}

/* ── EXEC PRINT MODE ── */

  .exec-print-mode #tab-executive{display:block!important;}
  .exec-print-mode #tab-executive *{display:revert!important;}
  .exec-print-mode .exec-wrap{display:block!important;}
}

  body{background:#fff!important;color:#000!important;}
  table{font-size:10px!important;}
/* Print only executive tab when exec-print-mode active */
body.exec-print-mode .header,
body.exec-print-mode .upload-bar,
body.exec-print-mode .executive-toggle,
body.exec-print-mode .kpi-bar,
body.exec-print-mode .blockers-card,
body.exec-print-mode .probability-card,
body.exec-print-mode .whatif-card,
body.exec-print-mode .toolbar,
body.exec-print-mode .alert-strip,
body.exec-print-mode .prog-wrap,
body.exec-print-mode .tabs,
body.exec-print-mode #tab-retea,
body.exec-print-mode #tab-grupuri,
body.exec-print-mode #tab-planificare,
body.exec-print-mode #tab-proiectie,
body.exec-print-mode .notif-panel{display:none!important;}
body.exec-print-mode{background:#fff!important;color:var(--text)!important;}
body.exec-print-mode #tab-executive{display:block!important;}
body.exec-print-mode .exec-wrap{padding:16px;}
body.exec-print-mode .exec-hero{background:#e8f0f8!important;}
body.exec-print-mode .exec-card{border:1px solid #ccc!important;}
body.exec-print-mode .exec-print-btn{display:none!important;}
@media(max-width:600px){
  .kpi-val{font-size:13px;}.kpi-lbl{font-size:7px;}
  .prog-label{width:100px;font-size:9px;}
  .toolbar{padding:6px 12px;}.pad{padding:12px;}
  .tll{width:140px;}.blockers-grid{grid-template-columns:1fr;}
}

/* ===============================
   WOW BOARD LIGHT — SAFE OVERRIDE
=============================== */
:root{
  --bg:#f8fbff;--bg2:#ffffff;--bg3:#f1f5f9;
  --text:#0f172a;--muted:#64748b;
  --navy:#1d4ed8;--blue:#2563eb;--accent:#2563eb;
  --green:#16a34a;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;
  --yellow:#d97706;--yellow-bg:#fef3c7;
  --border:rgba(0,0,0,0.06);
  --shadow-sm:0 4px 12px rgba(0,0,0,0.05);
  --shadow-md:0 10px 30px rgba(0,0,0,0.08);
  --r:16px;--rsm:10px;
}
body{background:linear-gradient(180deg,#f8fbff 0%,#eef4fb 100%)!important;-webkit-font-smoothing:antialiased;}
.header{background:linear-gradient(135deg,#2563eb,#1d4ed8,#3b82f6)!important;border-bottom:none!important;box-shadow:0 12px 32px rgba(37,99,235,.25)!important;}
.header h1{font-size:22px!important;letter-spacing:-0.4px;}
.header-sub{opacity:.85;}
.header-badge{background:rgba(255,255,255,.2)!important;color:#fff!important;}
.stat{background:rgba(255,255,255,.15)!important;border-color:rgba(255,255,255,.2)!important;}
.stat .v{color:#fff!important;}.stat .l{color:rgba(255,255,255,.75)!important;}
.kpi-bar{box-shadow:var(--shadow-md)!important;border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.kpi-item{background:#fff!important;transition:.25s;}
.kpi-item:hover{transform:translateY(-2px);background:#f1f5ff!important;}
.kpi-val{font-size:18px!important;font-weight:700!important;}
.blockers-card,.probability-card,.whatif-card,.panel,.exec-card,.exec-progress-card,.pc,.tl-wrap{background:#fff!important;border:none!important;border-radius:var(--r)!important;box-shadow:var(--shadow-md)!important;}
.blocker-item:hover,.exec-kpi:hover,.pc:hover{transform:translateY(-3px);}
.exec-kpi{background:#fff!important;border:none!important;box-shadow:var(--shadow-md)!important;}
th{background:#f1f5f9!important;color:#64748b!important;font-size:10px!important;letter-spacing:.08em;}
td{padding:8px 10px!important;}
tr:hover td{background:#eef4ff!important;}
.tw{border:none!important;box-shadow:var(--shadow-md)!important;}
.pb-fill,.prog-fill,.exec-prog-fill{box-shadow:0 0 8px rgba(37,99,235,.25);}
.tb-btn{background:#fff!important;border:1px solid rgba(37,99,235,.2)!important;color:#1d4ed8!important;}
.tb-btn:hover{background:#eff6ff!important;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.15)!important;}
.upload-btn{background:linear-gradient(135deg,#2563eb,#3b82f6)!important;border:none!important;box-shadow:0 6px 16px rgba(37,99,235,.25)!important;}
.upload-btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(37,99,235,.35)!important;}
.reset-btn{background:#fee2e2!important;border:1px solid rgba(220,38,38,.2)!important;color:#dc2626!important;}
.exec-hero{background:linear-gradient(135deg,#2563eb,#1e40af,#3b82f6)!important;box-shadow:0 14px 34px rgba(37,99,235,.35)!important;}
.alert-strip{background:#f8fafc!important;}
.upload-bar,.toolbar,.executive-toggle{background:#fff!important;}
.tabs{background:#fff!important;box-shadow:var(--shadow-sm)!important;}
.tab{border-radius:8px 8px 0 0;}
.tab.active{background:#fff!important;border-bottom:2px solid #2563eb!important;color:#1d4ed8!important;font-weight:600!important;}
.note{background:#eff6ff!important;border-left-color:#2563eb!important;color:#1e3a8a!important;}
.prog-outer,.exec-prog-outer,.tlbb,.pb-bg,.ranking-bar,.exec-group-bar-wrap{background:#f1f5f9!important;border:1px solid rgba(0,0,0,.05)!important;}
.notif-panel{background:#fff!important;box-shadow:-4px 0 24px rgba(0,0,0,.1)!important;}
.notif-item{background:#f8fafc!important;border-radius:var(--rsm)!important;}
.whatif-result{background:#eff6ff!important;border-left-color:#2563eb!important;color:#1e3a8a!important;}
.exec-print-btn{background:rgba(255,255,255,.2)!important;border-color:rgba(255,255,255,.4)!important;}
.rok{background:#dcfce7!important;color:#15803d!important;border-color:rgba(22,163,74,.2)!important;}
.rno{background:#fee2e2!important;color:#b91c1c!important;border-color:rgba(220,38,38,.2)!important;}
.ag-ok{background:#dcfce7!important;color:#15803d!important;border-color:rgba(22,163,74,.2)!important;}
.ag-warn{background:#fef3c7!important;color:#92400e!important;border-color:rgba(217,119,6,.2)!important;}
.ag-nok{background:#fee2e2!important;color:#b91c1c!important;border-color:rgba(220,38,38,.2)!important;}
.rp-gis{background:#eff6ff!important;color:#1d4ed8!important;border-color:rgba(37,99,235,.2)!important;}

.rp-fol{background:#dcfce7!important;color:#15803d!important;border-color:rgba(22,163,74,.2)!important;}


.exec-hero .exec-hero-left h2{color:#fff!important;}
.exec-hero .exec-hero-left p{color:rgba(255,255,255,.8)!important;}
.exec-hero .exec-hero-date{color:rgba(255,255,255,.75)!important;}
.exec-hero .exec-verdict-lbl{color:rgba(255,255,255,.85)!important;}

/* ═══════════════════════════════════════
   RESPONSIVE — Mobile & Tablet
═══════════════════════════════════════ */
@media(max-width:1024px){
  .blockers-grid{grid-template-columns:1fr 1fr;}
  .exec-kpi-row{grid-template-columns:repeat(2,1fr);}

}

  .pad{padding:12px 14px;}
  .header{padding:12px 14px 10px;}
  .header-top{flex-direction:column;gap:10px;}
  .stats{gap:7px;}
  .stat{min-width:70px;padding:6px 10px;}
  .stat .v{font-size:14px;}
  .kpi-val{font-size:14px!important;}
  .kpi-lbl{font-size:7px;}
  .kpi-item{padding:7px 4px;}
  .blockers-grid{grid-template-columns:1fr;}
  .blockers-card,.probability-card,.whatif-card{margin:8px 14px 0;}

  .probability-bar-container{width:100%;}
  .plan-grid{grid-template-columns:1fr;}
  .pg{grid-template-columns:repeat(2,1fr);}
  .exec-kpi-row{grid-template-columns:repeat(2,1fr);gap:8px;}
  .exec-two-col{grid-template-columns:1fr;gap:12px;}
  .exec-hero{padding:18px 16px;}
  .exec-hero-left h2{font-size:17px!important;}
  .exec-wrap{padding:12px 14px;}
  .toolbar{padding:6px 14px;gap:6px;}
  .tb-lbl{display:none;}
  .tb-sep{display:none;}
  .tll{width:110px;font-size:9px;}
  .tly{width:80px;font-size:9px;}
  .tlr{flex-wrap:nowrap;gap:5px;}
  .prog-label{width:110px;font-size:9px;}
  .prog-eta{width:100px;font-size:9px;}
  .upload-bar{padding:8px 14px;gap:8px;}
  .upload-status{font-size:10px;}
  .tabs{padding:0 8px;}
  .tab{padding:8px 10px;font-size:11px;}
  .alert-strip{padding:5px 14px;}
  .whatif-controls{flex-direction:column;gap:12px;}
  .whatif-group{min-width:100%;}
}
@media(max-width:480px){
  .kpi-bar{overflow-x:auto;flex-wrap:nowrap;}
  .kpi-item{min-width:70px;}
  .pg{grid-template-columns:1fr 1fr;}
  .exec-kpi-row{grid-template-columns:1fr 1fr;}
  .blockers-grid{grid-template-columns:1fr;}
  .stats{flex-wrap:wrap;}
  .header h1{font-size:16px!important;}
  .tlr{gap:4px;}
}

.kzInput:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.1);background:#fff;}
.kzEye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#9a9890;font-size:15px;user-select:none;}
.kzBtn{width:100%;padding:12px;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 14px rgba(29,78,216,.3);transition:all .2s;}
.kzBtn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(29,78,216,.4);}
.kzErr{color:#dc2626;font-size:11px;margin-top:8px;background:#fee2e2;border-radius:7px;padding:7px 12px;display:none;}
.kzErr.show{display:block;}
.kzFoot{margin-top:20px;font-size:9px;color:#9a9890;}




/* ══ PRINT / PDF ══════════════════════════════════════════════ */
@media print {
  /* Ascunde chrome-ul UI pentru orice tip de print */
  #kzLogin, .kpi-bar, .alert-strip, .prog-wrap,
  .toolbar, .upload-bar, .executive-toggle,
  .tabs, .notif-panel, .blockers-card,
  .probability-card, .whatif-card,
  .exec-print-btn, .tb-btn, .reset-btn,
  .upload-btn { display: none !important; }

  /* Header simplificat */
  .header { box-shadow: none !important; border-bottom: 2px solid #1d4ed8 !important; }

  /* Fonturi și culori pentru print */
  body { background: #fff !important; color: #0f172a !important; font-size: 11px !important; }

  /* Culori păstrate */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  /* Evită tăierea cardurilor */
  .exec-kpi, .exec-card, .exec-progress-card, .panel, .tw { break-inside: avoid !important; }

  /* Tabele lizibile */
  table { font-size: 10px !important; }
  th { background: #1d4ed8 !important; color: #fff !important; }

  /* ── Mod executive: ascunde toate tab-urile mai puțin executive ── */
  body.exec-print-mode #tab-retea,
  body.exec-print-mode #tab-grupuri,
  body.exec-print-mode #tab-planificare,
  body.exec-print-mode #tab-proiectie { display: none !important; }

  body.exec-print-mode #tab-executive { display: block !important; }

  @page { margin: 12mm; size: A4; }
}
