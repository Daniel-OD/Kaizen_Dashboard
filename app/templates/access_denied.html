<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acces interzis · Kaizen Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0f1f35 0%,#1a3a5c 60%,#0d2137 100%);color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:40px 36px;max-width:440px;width:90%;text-align:center;color:#1e293b;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.icon{font-size:48px;margin-bottom:12px}
h1{font-size:20px;font-weight:700;margin-bottom:8px}
p{font-size:13px;color:#64748b;line-height:1.5;margin-bottom:16px}
.email{font-family:'DM Mono',monospace;font-size:12px;background:#f1f5f9;padding:6px 12px;border-radius:6px;display:inline-block;margin-bottom:16px;word-break:break-all}
.domains{font-size:11px;color:#94a3b8;margin-bottom:20px}
a.btn{display:inline-block;padding:10px 24px;background:#2563eb;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600}
a.btn:hover{background:#1d4ed8}
.foot{margin-top:20px;font-size:10px;color:#cbd5e1}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🚫</div>
  <h1>Acces interzis</h1>
  <p>Contul tău Microsoft nu este autorizat să acceseze acest dashboard.</p>
  <div class="email">{{EMAIL}}</div>
  <div class="domains">Domenii acceptate: {{DOMAINS}}</div>
  <a class="btn" href="/logout">Autentifică-te cu alt cont →</a>
  <div class="foot">Delgaz Grid S.A. · Kaizen Dashboard · 2026</div>
</div>
</body>
</html>
